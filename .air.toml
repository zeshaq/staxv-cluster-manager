# air config — https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  cmd          = "go build -ldflags=\"-X main.version=dev-air\" -o ./tmp/staxv-cluster-manager ./cmd/staxv-cluster-manager"
  entrypoint   = "./tmp/staxv-cluster-manager"
  args_bin     = ["serve", "--config", "./dev-config.toml", "--addr", ":5002"]
  delay        = 500
  kill_delay   = "2s"
  send_interrupt = true
  stop_on_error  = false
  log          = "build-errors.log"
  include_ext  = ["go", "toml", "tmpl", "html"]
  exclude_dir  = ["tmp", "vendor", "frontend", "static", ".git", ".claude", ".github"]
  exclude_regex = ["_test\\.go"]

[log]
  time = true

[color]
  build   = "yellow"
  runner  = "green"
  app     = ""

[screen]
  clear_on_rebuild = false
